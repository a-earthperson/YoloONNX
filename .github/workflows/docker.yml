name: Docker

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: docker/tensorrt.Dockerfile
            image_tag: tensorrt
          - dockerfile: docker/cuda.Dockerfile
            image_tag: cuda
          - dockerfile: docker/onnx.Dockerfile
            image_tag: onnx
          - dockerfile: docker/openvino.Dockerfile
            image_tag: openvino
          - dockerfile: docker/tflite.Dockerfile
            image_tag: tflite
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t "yolo-frigate:ci-${{ matrix.image_tag }}" -f "${{ matrix.dockerfile }}" .
