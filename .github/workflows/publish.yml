name: publish

on:
  release:
    types: [published]

# permissions are needed if pushing to ghcr.io
permissions:
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: ./nvidia-trt.Dockerfile
            image_suffix: -nvidia-trt
          - dockerfile: ./intel-gpu.Dockerfile
            image_suffix: -intel-gpu
          - dockerfile: ./coral-tpu.Dockerfile
            image_suffix: -coral-tpu
    steps:
    - name: Check out
      uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GHCR
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}${{ matrix.image_suffix }}
    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
