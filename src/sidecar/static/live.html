<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>yolo-frigate live view</title>
    <link rel="stylesheet" href="/live/assets/live.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div>
          <h1>Live detection</h1>
          <p class="subtitle">Camera preview with server-side YOLO overlays.</p>
        </div>
        <label class="fps-control" for="fps-input">
          Detection FPS
          <input id="fps-input" type="number" min="0.5" step="0.5" value="2" />
        </label>
      </header>

      <section class="stage">
        <video id="source-video" autoplay muted playsinline hidden></video>
        <canvas id="preview-canvas"></canvas>
      </section>

      <footer class="status-bar">
        <span id="status-text">Requesting camera access...</span>
        <span id="metrics-text">Waiting for first detection...</span>
      </footer>
    </main>

    <script type="module" src="/live/assets/live.js"></script>
  </body>
</html>
